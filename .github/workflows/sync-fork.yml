name: Sync fork

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC (03:00 ART)
  workflow_dispatch:      # Lets you trigger it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync main from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync Solar-DQD/rrhh-back -b main
